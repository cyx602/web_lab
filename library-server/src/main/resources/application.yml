spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update   # 自动建表，开发阶段可以用，上线改为 validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

# JWT 密钥（自行生成一个Base64字符串）
jwt:
  secret: NCHU-Library-Secret-Key-2026-Experiment3
  expiration: 86400000   # 24小时，单位毫秒